  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── 테마 CSS 변수 ── */
    :root {
      --pw-bg: #060e1c; --pw-box: #0e1e32; --pw-border: #1a2f47;
      --pw-title: #d8eaf8; --pw-sub: #3d5f7e; --pw-label: #6b8fa8;
      --pw-input-bg: #060e1c; --pw-input-border: #1f3652; --pw-input-color: #d8eaf8;
      --pw-hint: #3d5f7e; --pw-spin-border: #1a2f47; --pw-spin-top: #818cf8;
    }
    body.theme-light {
      --pw-bg: #f0f4f8; --pw-box: #ffffff; --pw-border: #dde5ef;
      --pw-title: #1e293b; --pw-sub: #64748b; --pw-label: #475569;
      --pw-input-bg: #f8fafc; --pw-input-border: #cbd5e1; --pw-input-color: #1e293b;
      --pw-hint: #94a3b8; --pw-spin-border: #dde5ef; --pw-spin-top: #4f46e5;
    }
    /* ── 비밀번호 게이트 화면 ── */
    #pw-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--pw-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .pw-box {
      background: var(--pw-box);
      border: 1px solid var(--pw-border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.15);
    }
    .pw-logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 0 18px #818cf860;
    }
    .pw-title { color: var(--pw-title); font-size: 20px; font-weight: 900; letter-spacing: -0.04em; }
    .pw-sub   { color: var(--pw-sub); font-size: 12px; margin-top: 2px; }
    .pw-label { color: var(--pw-label); font-size: 11px; font-weight: 700;
                letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .pw-input {
      width: 100%; background: var(--pw-input-bg);
      border: 1px solid var(--pw-input-border); border-radius: 9px;
      padding: 12px 14px; color: var(--pw-input-color); font-size: 15px;
      outline: none; font-family: inherit; letter-spacing: 0.08em;
      transition: border-color .15s, box-shadow .15s;
    }
    .pw-input:focus { border-color: #818cf8; box-shadow: 0 0 0 3px #818cf820; }
    .pw-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border: none; border-radius: 9px;
      color: #fff; font-size: 14px; font-weight: 800;
      font-family: inherit; cursor: pointer; transition: opacity .15s;
    }
    .pw-btn:hover  { opacity: 0.88; }
    .pw-btn:active { opacity: 0.75; }
    .pw-error { color: #f87171; font-size: 12px; font-weight: 600; text-align: center; min-height: 18px; }
    .pw-hint  { color: var(--pw-hint); font-size: 11px; text-align: center; line-height: 1.6; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
    /* ── 로딩 스피너 ── */
    #db-loading {
      position: fixed; inset: 0; z-index: 8888;
      background: var(--pw-bg);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--pw-spin-border);
      border-top-color: var(--pw-spin-top);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- ── 테마 플래시 방지: body 클래스 즉시 적용 ── -->
  <script>
    (function(){
      try{
        if(localStorage.getItem('cst_theme_v1')==='light'){
          document.documentElement.classList.add('theme-light');
          document.addEventListener('DOMContentLoaded',function(){
            document.body.classList.add('theme-light');
          });
        }
      }catch(e){}
    })();
  </script>
</head>
<body>

  <!-- ════════════════════════════════
       비밀번호 게이트
       ★ 비밀번호 변경 방법 ★
         1. https://emn178.github.io/online-tools/sha256.html 접속
         2. 새 비밀번호 입력 → 해시값 복사
         3. 아래 PW_HASH 값을 교체
         4. GitHub에 index.html 저장
       ════════════════════════════════ -->
  <div id="pw-gate">
    <div class="pw-box" id="pw-box">
      <div class="pw-logo">C</div>
      <div>
        <div class="pw-title">Chungcheong Sales Team</div>
        <div class="pw-sub">충청영업팀 실적관리 시스템 · 접근 권한 확인</div>
      </div>
      <div>
        <div class="pw-label">비밀번호</div>
        <input class="pw-input" type="password" id="pw-input"
               placeholder="비밀번호를 입력하세요"
               onkeydown="if(event.key==='Enter') checkPw()" />
      </div>
      <div class="pw-error" id="pw-error"></div>
      <button class="pw-btn" onclick="checkPw()">접속하기 →</button>
      <div class="pw-hint">비밀번호를 모르시면 관리자에게 문의하세요.</div>
    </div>
  </div>

  <!-- ── Firebase 데이터 로딩 중 스피너 ── -->
  <div id="db-loading">
    <div class="spinner"></div>
    <span style="color:#3d5f7e; font-size:13px; font-family:'Noto Sans KR',sans-serif;">
      데이터 불러오는 중...
    </span>
  </div>

  <!-- ── 앱 컨테이너 (인증 후 표시) ── -->
  <div id="root" style="display:none;"></div>

  <script>
    // ──────────────────────────────────────────────
    //  ★ 현재 비밀번호: mx2025!
    //  변경하려면 위 주석 안내를 따르세요.
    // ──────────────────────────────────────────────
    const PW_HASH    = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
    const SESSION_KEY = "cst_auth_v1";

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function checkPw() {
      const input = document.getElementById("pw-input").value;
      const errEl = document.getElementById("pw-error");
      const boxEl = document.getElementById("pw-box");
      if (!input) { errEl.textContent = "비밀번호를 입력해주세요."; return; }
      const hash = await sha256(input);
      if (hash === PW_HASH) {
        sessionStorage.setItem(SESSION_KEY, "1");
        document.getElementById("pw-gate").style.display    = "none";
        document.getElementById("db-loading").style.display = "flex";
        // 앱 스크립트 로드 완료 대기 후 표시
        const waitReact = setInterval(() => {
          if (window.__appReady) {
            clearInterval(waitReact);
            document.getElementById("db-loading").style.display = "none";
            document.getElementById("root").style.display = "block";
          }
        }, 100);
      } else {
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        boxEl.classList.remove("shake");
        void boxEl.offsetWidth;
        boxEl.classList.add("shake");
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }

    (function() {
      if (sessionStorage.getItem(SESSION_KEY) === "1") {
        document.getElementById("pw-gate").style.display    = "none";
        document.getElementById("db-loading").style.display = "flex";
        const waitReact = setInterval(() => {
          if (window.__appReady) {
            clearInterval(waitReact);
            document.getElementById("db-loading").style.display = "none";
            document.getElementById("root").style.display = "block";
          }
        }, 100);
      } else {
        window.addEventListener("load", () => document.getElementById("pw-input").focus());
      }
    })();
  </script>

  <!-- ── 앱 로직 (기능·실적 로직 수정 시 이 파일만 교체) ── -->
  <script type="text/babel" src="app.js?v=3.0"></script>

      window.addEventListener("load", () => {

          .catch(err => console.warn("SW 등록 실패:", err));

  </script>

</body>
