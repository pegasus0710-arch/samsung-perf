  <style>
    /* ── 테마 CSS 변수 ── */
    :root {
      --pw-bg: #060e1c; --pw-box: #0e1e32; --pw-border: #1a2f47;
      --pw-title: #d8eaf8; --pw-sub: #3d5f7e; --pw-label: #6b8fa8;
      --pw-input-bg: #060e1c; --pw-input-border: #1f3652; --pw-input-color: #d8eaf8;
      --pw-hint: #3d5f7e; --pw-spin-border: #1a2f47; --pw-spin-top: #818cf8;
    }
    body.theme-light {
      --pw-bg: #f0f4f8; --pw-box: #ffffff; --pw-border: #dde5ef;
      --pw-title: #1e293b; --pw-sub: #64748b; --pw-label: #475569;
      --pw-input-bg: #f8fafc; --pw-input-border: #cbd5e1; --pw-input-color: #1e293b;
      --pw-hint: #94a3b8; --pw-spin-border: #dde5ef; --pw-spin-top: #4f46e5;
    }
    /* ── 비밀번호 게이트 화면 ── */
    #pw-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--pw-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .pw-box {
      background: var(--pw-box);
      border: 1px solid var(--pw-border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.15);
    }
    .pw-logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 0 18px #818cf860;
    }
    .pw-title { color: var(--pw-title); font-size: 20px; font-weight: 900; letter-spacing: -0.04em; }
    .pw-sub   { color: var(--pw-sub); font-size: 12px; margin-top: 2px; }
    .pw-label { color: var(--pw-label); font-size: 11px; font-weight: 700;
                letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .pw-input {
      width: 100%; background: var(--pw-input-bg);
      border: 1px solid var(--pw-input-border); border-radius: 9px;
      padding: 12px 14px; color: var(--pw-input-color); font-size: 15px;
      outline: none; font-family: inherit; letter-spacing: 0.08em;
      transition: border-color .15s, box-shadow .15s;
    }
    .pw-input:focus { border-color: #818cf8; box-shadow: 0 0 0 3px #818cf820; }
    .pw-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border: none; border-radius: 9px;
      color: #fff; font-size: 14px; font-weight: 800;
      font-family: inherit; cursor: pointer; transition: opacity .15s;
    }
    .pw-btn:hover  { opacity: 0.88; }
    .pw-btn:active { opacity: 0.75; }
    .pw-error { color: #f87171; font-size: 12px; font-weight: 600; text-align: center; min-height: 18px; }
    .pw-hint  { color: var(--pw-hint); font-size: 11px; text-align: center; line-height: 1.6; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* body 기본 배경 (Babel 로드 중 검은화면 방지) */
    body { background: #e8edf4; }
  </style>
  <!-- 테마 즉시 적용 -->
  <script>
    (function(){
      try {
        const t = localStorage.getItem('cst_theme_v1') || 'light';
        const bg = t === 'light' ? '#e8edf4' : '#07101f';
        document.write('<style>body{background:' + bg + '}</style>');
      } catch(e) {}
    })();
  </script>
</head>
<body>

  <!-- ════════════════════════════════
       비밀번호 게이트
       ★ 비밀번호 변경 방법 ★
         1. https://emn178.github.io/online-tools/sha256.html 접속
         2. 새 비밀번호 입력 → 해시값 복사
         3. 아래 PW_HASH 값을 교체
         4. GitHub에 index.html 저장
       ════════════════════════════════ -->
  <div id="pw-gate">
    <div class="pw-box" id="pw-box">
      <div class="pw-logo">C</div>
      <div>
        <div class="pw-title">관리시스템</div>
        <div class="pw-sub">접속 권한 확인</div>
      </div>
      <div>
        <div class="pw-label">비밀번호</div>
        <input class="pw-input" type="password" id="pw-input"
               placeholder="비밀번호를 입력하세요"
               onkeydown="if(event.key==='Enter') checkPw()" />
      </div>
      <div class="pw-error" id="pw-error"></div>
      <button class="pw-btn" onclick="checkPw()">접속하기 →</button>
      <div class="pw-hint">비밀번호를 모르시면 관리자에게 문의하세요.</div>
    </div>
  </div>

  <!-- ── 앱 컨테이너 ── -->
  <div id="root"></div>

  <script>
    const PW_HASH    = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
    const SESSION_KEY = "cst_auth_v1";
    const SESSION_MAX = 8 * 60 * 60 * 1000; // 8시간

    function isValidSession() {
      try {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) return false;
        const { token, ts } = JSON.parse(raw);
        if (token !== "cst_ok" + PW_HASH.slice(0,8)) return false;
        if (Date.now() - ts > SESSION_MAX) { sessionStorage.removeItem(SESSION_KEY); return false; }
        return true;
      } catch { return false; }
    }

    function setSession() {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        token: "cst_ok" + PW_HASH.slice(0,8), ts: Date.now()
      }));
    }

    // pw-gate를 로딩 스피너로 전환 후 React 마운트 감지해서 숨김
    function showLoading() {
      document.getElementById("pw-box").innerHTML = [
        '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0">',
        '<div style="width:36px;height:36px;border-radius:50%;border:3px solid rgba(129,140,248,.25);',
        'border-top-color:#818cf8;animation:spin .8s linear infinite"></div>',
        '<div style="color:#818cf8;font-size:14px;font-weight:700">앱 로딩 중...</div>',
        '<div style="color:#6b8fa8;font-size:11px">잠시만 기다려 주세요</div>',
        '</div>'
      ].join('');
      // root에 React 컨텐츠가 마운트되면 숨김
      var t = setInterval(function() {
        var root = document.getElementById("root");
        if (root && root.children.length > 0) {
          clearInterval(t);
          document.getElementById("pw-gate").style.display = "none";
        }
      }, 100);
      // 최대 60초 후 강제 숨김 (안전장치)
      setTimeout(function() {
        clearInterval(t);
        document.getElementById("pw-gate").style.display = "none";
      }, 60000);
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function checkPw() {
      const input = document.getElementById("pw-input").value;
      const errEl = document.getElementById("pw-error");
      const boxEl = document.getElementById("pw-box");
      if (!input) { errEl.textContent = "비밀번호를 입력해주세요."; return; }
      const hash = await sha256(input);
      if (hash === PW_HASH) {
        setSession();
        showLoading();
      } else {
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        boxEl.classList.remove("shake");
        void boxEl.offsetWidth;
        boxEl.classList.add("shake");
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }

    // 페이지 로드 시 인증 상태 확인
    if (isValidSession()) {
      showLoading();
    } else {
      sessionStorage.removeItem(SESSION_KEY);
      window.addEventListener("load", function() {
        var el = document.getElementById("pw-input");
        if (el) el.focus();
      });
    }
  </script>

  <!-- ── 앱 로직 ── -->
  <script type="text/babel" src="app.js?v=3.2"></script>

          .catch(err => console.warn("SW 등록 실패:", err));

  </script>

</body>
