  <style>
    :root {
      --bg:#07101f;--text:#e8f4fd;--pw-box:#0f2138;--pw-border:rgba(255,255,255,.14);
      --pw-input-bg:#07101f;--pw-input-border:rgba(255,255,255,.08);--pw-input-color:#e8f4fd;
      --scroll-thumb:rgba(255,255,255,.12);
    }
    body.theme-light {
      --bg:#f0f4f8;--text:#1e293b;--pw-box:#ffffff;--pw-border:#dde5ef;
      --pw-input-bg:#f8fafc;--pw-input-border:#cbd5e1;--pw-input-color:#1e293b;
      --scroll-thumb:rgba(0,0,0,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
    #plan-content{transform-origin:top center;transition:transform .15s ease;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
    textarea{resize:vertical;font-family:'Segoe UI',system-ui,sans-serif}
    #pw-gate{position:fixed;inset:0;z-index:9999;background:var(--bg);
      display:flex;align-items:center;justify-content:center}
    .pw-box{background:var(--pw-box);border:1px solid var(--pw-border);border-radius:16px;
      padding:36px 40px;text-align:center;max-width:340px;width:90%}
    .pw-input{width:100%;background:var(--pw-input-bg);border:1px solid var(--pw-input-border);border-radius:8px;
      padding:10px 14px;color:var(--pw-input-color);font-size:15px;letter-spacing:2px;outline:none;transition:border-color .2s}
    .pw-input:focus{border-color:#7c83f5}
    .pw-btn{width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;
      background:#7c83f5;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
    .shake{animation:shake .3s}
  </style>
  <!-- ── 테마 플래시 방지 ── -->
  <script>
    (function(){
      try{
        const t = localStorage.getItem('cst_theme_v1') || 'light';
        if(t === 'light')
          document.documentElement.classList.add('theme-light');
      }catch(e){}
    })();
  </script>
</head>
<body>

<div id="pw-gate" style="display:none">
  <div class="pw-box" id="pw-box">
    <div style="font-size:22px;margin-bottom:6px">🔐</div>
    <div style="font-weight:800;font-size:16px;margin-bottom:4px">충청영업팀</div>
    <div style="font-size:12px;margin-bottom:20px;opacity:.6">달성 계획 · 비밀번호 입력</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkPw()"/>
    <div id="pw-error" style="color:#f07070;font-size:11px;margin-top:8px;min-height:16px"></div>
    <button class="pw-btn" onclick="checkPw()">입력</button>
  </div>
</div>

<div id="root"></div>

<script>
  const PW_HASH  = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
  const AUTH_KEY = "cst_auth_v1";
  async function sha256(str){
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function checkPw(){
    const input=document.getElementById("pw-input").value;
    const errEl=document.getElementById("pw-error");
    const boxEl=document.getElementById("pw-box");
    if(!input){errEl.textContent="비밀번호를 입력해주세요.";return;}
    const hash=await sha256(input);
    if(hash===PW_HASH){
      localStorage.setItem(AUTH_KEY,"1");
      document.getElementById("pw-gate").style.display="none";
    } else {
      errEl.textContent="비밀번호가 올바르지 않습니다.";
      boxEl.classList.remove("shake");void boxEl.offsetWidth;boxEl.classList.add("shake");
      document.getElementById("pw-input").value="";
    }
  }
  (function(){
    if(localStorage.getItem(AUTH_KEY)==="1"||sessionStorage.getItem(AUTH_KEY)==="1"){
      // 인증됨
    } else {
      document.getElementById("pw-gate").style.display="flex";
      window.addEventListener("load",()=>document.getElementById("pw-input").focus());
    }
  })();
</script>

<script type="text/babel" src="plan.js"></script>

  <!-- ── Service Worker 등록 ── -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .catch(err => console.warn("SW 등록 실패:", err));
      });
    }
  </script>

</body>
