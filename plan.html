<script>
  const PW_HASH  = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
  const AUTH_KEY = "cst_auth_v1";
  async function sha256(str){
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function checkPw(){
    const input=document.getElementById("pw-input").value;
    const errEl=document.getElementById("pw-error");
    const boxEl=document.getElementById("pw-box");
    if(!input){errEl.textContent="비밀번호를 입력해주세요.";return;}
    const hash=await sha256(input);
    if(hash===PW_HASH){
      localStorage.setItem(AUTH_KEY,"1");
      document.getElementById("pw-gate").style.display="none";
    } else {
      errEl.textContent="비밀번호가 올바르지 않습니다.";
      boxEl.classList.remove("shake");void boxEl.offsetWidth;boxEl.classList.add("shake");
      document.getElementById("pw-input").value="";
    }
  }
  (function(){
    if(localStorage.getItem(AUTH_KEY)==="1"||sessionStorage.getItem(AUTH_KEY)==="1"){
      // 인증됨
    } else {
      document.getElementById("pw-gate").style.display="flex";
      window.addEventListener("load",()=>document.getElementById("pw-input").focus());
    }
  })();
</script>

// ── ErrorBoundary
class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error("PlanApp 에러:",e,info);}
  render(){
    if(this.state.err) return(
      <div style={{padding:40,color:"#f07070",fontFamily:"monospace",background:"#07101f",minHeight:"100vh"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>⚠ 렌더 오류</div>
        <pre style={{fontSize:12,whiteSpace:"pre-wrap",color:"#e8f4fd"}}>{String(this.state.err)}</pre>
        <button onClick={()=>this.setState({err:null})}
          style={{marginTop:20,padding:"8px 20px",background:"#7c83f5",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>
          재시도
        </button>
      </div>
    );
    return this.props.children;
  }
}

// ── SVG 라인 차트 (범례 포함)
function MiniChart({series,labels,h=200,pctMode=false,grMode=false}){
  const [tip,setTip]=useState(null);
  const W=560,PT=18,PL=38,PR=20,PB=36;
  const iH=h-PT-PB, iW=W-PL-PR;
  const allV=series.flatMap(s=>s.data.filter(v=>v!==null)).map(gNum);
  const hasData=allV.length>0;
  if(!hasData)return(
    <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>
      데이터 없음
    </div>
  );
  const maxV=Math.max(...allV,pctMode?100:0.1);
  const minV=grMode?Math.min(...allV,0):0;
  const range=maxV-minV||1;
  const cy=v=>PT+iH*(1-(gNum(v)-minV)/range);
  const cx=i=>PL+iW*i/11;
  const smooth=pts=>{
    if(!pts.length)return"";
    let d=`M${pts[0].x},${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const px=pts[i-1],nx=pts[i];
      const cpx=(px.x+nx.x)/2;
      d+=` C${cpx},${px.y} ${cpx},${nx.y} ${nx.x},${nx.y}`;
    }
    return d;
  };
  // Y축 레이블
  const yTicks=[0,.25,.5,.75,1].map(r=>({r,v:minV+range*r}));
  return(
    <div style={{position:"relative"}}>
      {/* 범례 */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:8,paddingLeft:4}}>
        {series.map((s,si)=>(
          <div key={si} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:s.dash?0:16,height:0,borderTop:`${s.bold?3:2}px ${s.dash?"dashed":"solid"} ${s.color}`,opacity:s.op||1}}/>
            {s.dash&&<div style={{width:16,height:0,borderTop:`2px dashed ${s.color}`,opacity:s.op||1}}/>}
            <span style={{color:C.muted2,fontSize:10}}>{s.label}</span>
          </div>
        ))}
      </div>
      <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,overflow:"visible"}} onMouseLeave={()=>setTip(null)}>
        {/* 그리드 */}
        {yTicks.map(({r,v})=>(
          <g key={r}>
            <line x1={PL} y1={PT+iH*(1-r)} x2={W-PR} y2={PT+iH*(1-r)} stroke="rgba(255,255,255,.05)" strokeWidth={1}/>
            <text x={PL-4} y={PT+iH*(1-r)+4} fill={C.muted} fontSize={8} textAnchor="end">
              {pctMode||grMode?Math.round(v)+"%":Math.round(v)}
            </text>
          </g>
        ))}
        {grMode&&<line x1={PL} y1={cy(0)} x2={W-PR} y2={cy(0)} stroke={C.muted2} strokeWidth={1} strokeDasharray="3,2" opacity={.5}/>}
        {pctMode&&<line x1={PL} y1={cy(100)} x2={W-PR} y2={cy(100)} stroke={C.green} strokeWidth={1} strokeDasharray="4,3" opacity={.5}/>}
        {/* 데이터 라인 */}
        {series.map((s,si)=>{
          const pts=s.data.map((v,i)=>({x:cx(i),y:cy(v),v:gNum(v)})).filter((_,i)=>s.data[i]!==null);
          if(!pts.length)return null;
          const d=smooth(pts);
          const fillPath=`${d} L${pts[pts.length-1].x},${cy(Math.max(minV,0))} L${pts[0].x},${cy(Math.max(minV,0))} Z`;
          return(
            <g key={si}>
              {s.fill&&<path d={fillPath} fill={s.color} opacity={.07}/>}
              <path d={d} fill="none" stroke={s.color} strokeWidth={s.bold?2.5:1.5} strokeDasharray={s.dash?"5,3":undefined} opacity={s.op||1}/>
              {pts.map((p,pi)=>(
                <circle key={pi} cx={p.x} cy={p.y} r={s.bold?4:3} fill={s.color} stroke={C.bg} strokeWidth={1.5} opacity={s.op||1}/>
              ))}
              {s.showLabels&&pts.map((p,pi)=>{
                const prev=pts[pi-1];
                const goUp=!prev||p.y<prev.y;
                return(
                  <text key={pi} x={p.x} y={p.y+(goUp?-12:16)} fill={s.color} fontSize={9} fontWeight={700}
                    textAnchor={p.x<PL+30?"start":p.x>W-PR-30?"end":"middle"}
                    style={{filter:"drop-shadow(0 1px 2px rgba(0,0,0,.9))"}}>
                    {pctMode||grMode?Math.round(p.v)+"%":Math.round(p.v)}
                  </text>
                );
              })}
            </g>
          );
        })}
        {/* 툴팁 영역 */}
        {labels.map((_,i)=>(
          <rect key={i} x={cx(i)-20} y={PT} width={40} height={iH} fill="transparent"
            onMouseEnter={()=>{
              const items=series.map(s=>({label:s.label,color:s.color,val:s.data[i]})).filter(it=>it.val!==null);
              setTip({mi:i,items,xi:i});
            }}/>
        ))}
        {/* X축 레이블 */}
        {labels.map((l,i)=>(
          <text key={i} x={cx(i)} y={h-6} fill={C.muted} fontSize={9} textAnchor="middle">{l}</text>
        ))}
      </svg>
      {tip&&(
        <div style={{position:"absolute",left:`${Math.min(tip.xi/11*88+2,66)}%`,top:"10%",
          background:"rgba(7,16,31,.97)",border:`1px solid ${C.b2}`,
          borderRadius:8,padding:"8px 12px",pointerEvents:"none",zIndex:10,
          boxShadow:"0 4px 16px rgba(0,0,0,.6)",minWidth:110}}>
          <div style={{color:C.muted,fontSize:9,marginBottom:4,fontWeight:700}}>{labels[tip.mi]}</div>
          {tip.items.map((it,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:12,marginBottom:2}}>
              <span style={{color:C.muted2,fontSize:10}}>{it.label}</span>
              <span style={{color:it.color,fontSize:11,fontWeight:800}}>
                {pctMode||grMode?Math.round(gNum(it.val))+"%":Math.round(gNum(it.val))+"억"}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 자동 높이 textarea
function AutoTextarea({value,onChange,placeholder,minHeight=220,readOnly=false,fontSize=14,style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    el.style.height="auto";
    el.style.height=Math.max(minHeight,el.scrollHeight)+"px";
  },[value,minHeight,fontSize]);
  return(
    <textarea ref={ref} value={value} onChange={readOnly?undefined:onChange}
      readOnly={readOnly} placeholder={readOnly?"":placeholder}
      style={{width:"100%",minHeight:minHeight,background:C.bg,
        border:`1px solid ${readOnly?"rgba(255,255,255,.12)":C.accent+"60"}`,borderRadius:8,
        padding:"14px 16px",color:C.text,fontSize:fontSize,lineHeight:1.75,
        outline:"none",resize:readOnly?"none":"vertical",overflow:"hidden",
        cursor:readOnly?"default":"text",opacity:readOnly?.85:1,
        transition:"height .1s ease, border-color .2s",...style}}/>
  );
}

// ── 리치 에디터 (툴바 포함)
function RichEditor({value,onChange,placeholder,minHeight=220,readOnly=false,fontSize=14,style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    el.style.height="auto";
    el.style.height=Math.max(minHeight,el.scrollHeight)+"px";
  },[value,minHeight,fontSize]);

  const insert=(prefix,suffix="")=>{
    const el=ref.current;
    if(!el||readOnly)return;
    const s=el.selectionStart,e=el.selectionEnd;
    const sel=value.slice(s,e);
    const next=value.slice(0,s)+prefix+sel+suffix+value.slice(e);
    onChange({target:{value:next}});
    setTimeout(()=>{el.focus();el.setSelectionRange(s+prefix.length,e+prefix.length);},0);
  };
  const insertLine=(prefix)=>{
    const el=ref.current;
    if(!el||readOnly)return;
    const s=el.selectionStart;
    const before=value.slice(0,s);
    const lineStart=before.lastIndexOf("\n")+1;
    const next=value.slice(0,lineStart)+prefix+value.slice(lineStart);
    onChange({target:{value:next}});
    setTimeout(()=>{el.focus();el.setSelectionRange(s+prefix.length,s+prefix.length);},0);
  };

  const tools=[
    {label:"•",title:"글머리 (•)",act:()=>insertLine("• ")},
    {label:"–",title:"대시 (–)",act:()=>insertLine("– ")},
    {label:"✓",title:"체크 (✓)",act:()=>insertLine("✓ ")},
    {label:"▶",title:"화살표 (▶)",act:()=>insertLine("▶ ")},
    {label:"★",title:"별 (★)",act:()=>insert("★ ")},
    {label:"[ ]",title:"구분선",act:()=>{
      const el=ref.current;if(!el||readOnly)return;
      const s=el.selectionStart;
      const nl=value.slice(0,s).endsWith("\n")||s===0?"":"\n";
      const next=value.slice(0,s)+nl+"─────────────────\n"+value.slice(s);
      onChange({target:{value:next}});
    }},
  ];

  return(
    <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${readOnly?"rgba(255,255,255,.12)":C.accent+"60"}`,transition:"border-color .2s"}}>
      {/* 툴바 */}
      <div style={{
        display:"flex",gap:3,padding:"6px 10px",
        background:readOnly?"rgba(255,255,255,.02)":"rgba(124,131,245,.08)",
        borderBottom:`1px solid ${readOnly?"rgba(255,255,255,.06)":C.accent+"30"}`,
        flexWrap:"wrap",alignItems:"center"}}>
        {!readOnly&&tools.map((t,i)=>(
          <button key={i} title={t.title} onClick={t.act} style={{
            padding:"3px 8px",borderRadius:4,border:`1px solid ${C.b1}`,
            background:"rgba(255,255,255,.05)",color:C.muted2,cursor:"pointer",
            fontSize:11,fontWeight:700,fontFamily:"monospace",
            transition:"background .15s, color .15s"}}
            onMouseEnter={e=>{e.target.style.background=C.accent+"30";e.target.style.color=C.accent;}}
            onMouseLeave={e=>{e.target.style.background="rgba(255,255,255,.05)";e.target.style.color=C.muted2;}}>
            {t.label}
          </button>
        ))}
        {readOnly&&<span style={{color:C.muted,fontSize:10}}>🔒 읽기 전용 — 수정하려면 위의 수정 버튼을 클릭하세요</span>}
        {!readOnly&&<span style={{color:C.muted,fontSize:9,marginLeft:"auto"}}>Tab·Enter 자유 입력</span>}
      </div>
      <textarea ref={ref} value={value} onChange={readOnly?undefined:onChange}
        readOnly={readOnly} placeholder={readOnly?"":placeholder}
        style={{width:"100%",minHeight:minHeight,background:C.bg,border:"none",
          padding:"14px 16px",color:C.text,fontSize:fontSize,lineHeight:1.8,
          outline:"none",resize:readOnly?"none":"vertical",overflow:"hidden",
          display:"block",cursor:readOnly?"default":"text",opacity:readOnly?.85:1,
          transition:"height .1s ease",...style}}/>
    </div>
  );
}

      try{
        const snap=await window.db.collection("perf").doc("main").get();
        if(snap.exists){
          const d=snap.data();
          if(d.perfData) setPerfData(d.perfData);
          if(d.planTextData) setPlanTextData(d.planTextData);
        }
      }catch(e){console.error("Firebase 로드 오류:",e);}
      finally{setDbReady(true);}
    })();
  },[]);

  // localStorage 텍스트 복원
  useEffect(()=>{
    try{
      const saved=localStorage.getItem(LS_TEXT);
      if(saved) setTextDraft(JSON.parse(saved));
    }catch{}
  },[]);

  // 텍스트 draft 3초 자동저장
  useEffect(()=>{
    clearTimeout(autoSaveTimer.current);
    if(Object.keys(textDraft).length>0){
      autoSaveTimer.current=setTimeout(()=>{
        try{localStorage.setItem(LS_TEXT,JSON.stringify(textDraft));}catch{}
      },3000);
    }
    return()=>clearTimeout(autoSaveTimer.current);
  },[textDraft]);

  // 텍스트 접근 헬퍼
  // 계획 텍스트: mode 무관하게 동일 데이터 (판매/매출 공통)
  const getText=(pYr,_mode,pPart,mk)=>{
    const d=textDraft[pYr]&&textDraft[pYr][pPart]&&textDraft[pYr][pPart][mk];
    const p=planTextData[pYr]&&planTextData[pYr][pPart]&&planTextData[pYr][pPart][mk];
    return d!==undefined?d:(p||"");
  };
  const setText=(pYr,_mode,pPart,mk,val)=>{
    setTextDraft(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next[pYr])next[pYr]={};
      if(!next[pYr][pPart])next[pYr][pPart]={};
      next[pYr][pPart][mk]=val;
      return next;
    });
  };

  // Firebase 저장
  const handleSave=async()=>{
    setSaveState("saving");
    try{
      const merged=JSON.parse(JSON.stringify(planTextData));
      const mergeDeep=(t,s)=>{
        Object.keys(s).forEach(k=>{
          if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){
            if(!t[k])t[k]={};
            mergeDeep(t[k],s[k]);
          } else {t[k]=s[k];}
        });
      };
      mergeDeep(merged,textDraft);
      await window.db.collection("perf").doc("main").set(
        {planTextData:merged,planUpdatedAt:new Date().toISOString()},
        {merge:true}
      );
      setPlanTextData(merged);
      setTextDraft({});
      localStorage.removeItem(LS_TEXT);
      setSaveState("saved");
      setIsEditing(false); // 저장 후 잠금
      setTimeout(()=>setSaveState("idle"),2500);
    }catch(e){
      console.error("저장 오류:",e);
      setSaveState("error");
      setTimeout(()=>setSaveState("idle"),3000);
    }
  };

  // 데이터 계산
  const pD=useMemo(()=>{const y=perfData&&perfData[yr];const m=y&&y[mode];return(m&&m.perf)||{};},[perfData,yr,mode]);
  const tD=useMemo(()=>{const y=perfData&&perfData[yr];const m=y&&y[mode];return(m&&m.target)||{};},[perfData,yr,mode]);
  const prevYrKey=yr==="26"?"25":yr==="25"?"24":null;
  const pD25=useMemo(()=>{if(!prevYrKey||!perfData)return{};const y=perfData[prevYrKey];const m=y&&y[mode];return(m&&m.perf)||{};},[perfData,prevYrKey,mode]);

  const mPerf=useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(pD[sk(i)])||{})[part])),[pD,part]);
  const mTgt =useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(tD[sk(i)])||{})[part])),[tD,part]);
  const mPrev=useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(pD25[sk(i)])||{})[part])),[pD25,part]);

  // 최근 실적 월 (emi)
  const emi=useMemo(()=>{
    for(let i=11;i>=0;i--){
      const r=pD[sk(i)];
      if(r&&Object.keys(r).length>0&&Object.values(r).some(v=>gNum(v)>0))return i;
    }
    return-1;
  },[pD]);

  // KPI
  const ytdP   =mPerf.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdT   =mTgt .slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdPrev=mPrev.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const annT   =mTgt.reduce((a,b)=>a+b,0);
  const remT   =Math.max(annT-ytdP,0);
  const remMonths=Math.max(11-emi,0);
  const avgMonthly=emi>=0&&ytdP>0?Math.round(ytdP/(emi+1)):0;
  const prevAvgMonthly=emi>=0&&ytdPrev>0?Math.round(ytdPrev/(emi+1)):0;
  const needPM =remMonths>0?Math.ceil(remT/remMonths):0;
  const ytdAr  =ytdT>0?(ytdP/ytdT*100).toFixed(1):null;
  const ytdGr  =ytdPrev>0?((ytdP-ytdPrev)/ytdPrev*100).toFixed(1):null;

  // CE/대외 비중 (누계)
  const ceYtd =emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD[sk(i)])||{}).CE),0):0;
  const hpYtd =emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD[sk(i)])||{}).휴대폰),0):0;
  const daeYtd=emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD[sk(i)])||{}).대외영업),0):0;
  // 전년 CE 비중
  const cePrevYtd =emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD25[sk(i)])||{}).CE),0):0;
  const hpPrevYtd =emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD25[sk(i)])||{}).휴대폰),0):0;
  const daePrevYtd=emi>=0?MONTHS.slice(0,emi+1).reduce((a,_,i)=>a+gNum((fullRow(pD25[sk(i)])||{}).대외영업),0):0;

  const ceSharePct=ceYtd>0&&part!=="CE"&&ytdP>0?(
    part==="대외영업"?(daeYtd-hpYtd)/ceYtd*100:ytdP/ceYtd*100
  ):null;
  const cePrevSharePct=cePrevYtd>0&&part!=="CE"&&ytdPrev>0?(
    part==="대외영업"?(daePrevYtd-hpPrevYtd)/cePrevYtd*100:ytdPrev/cePrevYtd*100
  ):null;
  const daeSharePct=daeYtd>0&&part!=="대외영업"&&part!=="CE"&&ytdP>0?ytdP/daeYtd*100:null;

  // 누계
  let cumP=0,cumT=0,cumPrev=0;
  const cumPerf   =MONTHS.map((_,i)=>{if(i>emi)return null;cumP+=mPerf[i];return cumP;});
  const cumTgt    =MONTHS.map((_,i)=>{cumT+=mTgt[i];return cumT;});
  const cumPrevArr=MONTHS.map((_,i)=>{if(i>emi)return null;cumPrev+=mPrev[i];return cumPrev;});
  const cumAr     =MONTHS.map((_,i)=>{if(i>emi||!cumTgt[i])return null;return(cumPerf[i]||0)/cumTgt[i]*100;});
  const cumGr     =MONTHS.map((_,i)=>{if(i>emi||!cumPrevArr[i])return null;return((cumPerf[i]||0)-cumPrevArr[i])/cumPrevArr[i]*100;});

  // 월별 달성/성장률
  const mArArr=MONTHS.map((_,i)=>i<=emi&&mTgt[i]>0?(mPerf[i]/mTgt[i]*100):null);
  const mGrArr=MONTHS.map((_,i)=>i<=emi&&mPrev[i]>0?((mPerf[i]-mPrev[i])/mPrev[i]*100):null);

  // ── planInput 연도 기준 참고 데이터
  const planPrevYrKey=planInput==="26"?"25":planInput==="25"?"24":null;
  const pD_pl=useMemo(()=>{const y=perfData&&perfData[planInput];const m=y&&y[mode];return(m&&m.perf)||{};},[perfData,planInput,mode]);
  const tD_pl=useMemo(()=>{const y=perfData&&perfData[planInput];const m=y&&y[mode];return(m&&m.target)||{};},[perfData,planInput,mode]);
  const pD25_pl=useMemo(()=>{if(!planPrevYrKey||!perfData)return{};const y=perfData[planPrevYrKey];const m=y&&y[mode];return(m&&m.perf)||{};},[perfData,planPrevYrKey,mode]);
  const mTgt_pl =useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(tD_pl[sk(i)])||{})[part])),[tD_pl,part]);
  const mPerf_pl=useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(pD_pl[sk(i)])||{})[part])),[pD_pl,part]);
  const mPrev_pl=useMemo(()=>MONTHS.map((_,i)=>gNum((fullRow(pD25_pl[sk(i)])||{})[part])),[pD25_pl,part]);
  const annT_pl =mTgt_pl.reduce((a,b)=>a+b,0);
  const emi_pl  =useMemo(()=>{for(let i=11;i>=0;i--){const r=pD_pl[sk(i)];if(r&&Object.values(r).some(v=>gNum(v)>0))return i;}return -1;},[pD_pl]);
  const ytdP_pl =mPerf_pl.slice(0,Math.max(emi_pl+1,0)).reduce((a,b)=>a+b,0);
  const ytdPrev_pl=mPrev_pl.slice(0,Math.max(emi_pl+1,0)).reduce((a,b)=>a+b,0);

  // 선택 월 정보 (planInput 연도 기준)
  const annPrev_pl=mPrev_pl.reduce((a,b)=>a+b,0); // 전년 연간 합계
  const selMi=selMonth==="annual"?null:selMonth;
  const selTgt =selMi!==null?mTgt_pl[selMi]:annT_pl;
  const selPerf=selMi!==null?mPerf_pl[selMi]:ytdP_pl;
  const selPrev=selMi!==null?mPrev_pl[selMi]:annPrev_pl; // 연간 선택시 전년 연간 합계
  const selGrowthTarget=selPrev>0&&selTgt>0?((selTgt-selPrev)/selPrev*100).toFixed(1):null;
  const selAr=selTgt>0&&selPerf>0?(selPerf/selTgt*100).toFixed(1):null;

  const color=KC[part]||C.accent;
  const hasDraft=Object.keys(textDraft).length>0;
  const currentText=getText(planInput,mode,part,selMonth==="annual"?"annual":String(selMonth));

  // 엑셀 다운로드
  const handleExcel=()=>{
    const wb=XLSX.utils.book_new();
    const addSheet=(name,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),name);
    addSheet("월별실적",[
      [`${yr}년 ${mode} - ${part} 월별 실적`],[],
      ["항목",...MONTHS,"누계"],
      ["목표",...mTgt.map(v=>Math.round(v)),Math.round(annT)],
      ["실적",...MONTHS.map((_,i)=>i<=emi?Math.round(mPerf[i]):""),Math.round(ytdP)],
      ["달성률",...MONTHS.map((_,i)=>i<=emi&&mTgt[i]>0?(mPerf[i]/mTgt[i]*100).toFixed(1)+"%":""),""],
      ["성장률",...MONTHS.map((_,i)=>i<=emi&&mPrev[i]>0?((mPerf[i]-mPrev[i])/mPrev[i]*100).toFixed(1)+"%":""),""],
      ["전년",...MONTHS.map((_,i)=>i<=emi?Math.round(mPrev[i]):""),Math.round(ytdPrev)],
    ]);
    addSheet("누계실적",[
      [`${yr}년 ${mode} - ${part} 누계 실적`],[],
      ["항목",...MONTHS],
      ["누계목표",...cumTgt.map(v=>Math.round(v))],
      ["누계실적",...cumPerf.map(v=>v!==null?Math.round(v):"")],
      ["누계달성",...cumAr.map(v=>v!==null?Math.round(v)+"%":"")],
      ["누계성장",...cumGr.map(v=>v!==null?Math.round(v)+"%":"")],
      ["누계전년",...cumPrevArr.map(v=>v!==null?Math.round(v):"")],
    ]);
    addSheet("KPI요약",[
      [`${yr}년 ${emi>=0?MONTHS[emi]:""} 기준 — ${mode} · ${part}`],[],
      ["항목","값"],
      ["연간목표",annT?Math.round(annT)+"억":"─"],
      ["누계실적",ytdP?Math.round(ytdP)+"억":"─"],
      ["월평균",avgMonthly?avgMonthly+"억":"─"],
      ["누계달성률",ytdAr?ytdAr+"%":"─"],
      ["전년비성장",ytdGr?ytdGr+"%":"─"],
      ["잔여목표",remT?Math.round(remT)+"억":"─"],
      ["잔여월평균",needPM?needPM+"억":"─"],
      ["CE비중",ceSharePct?ceSharePct.toFixed(1)+"%":"─"],
      ["전년CE비중",cePrevSharePct?cePrevSharePct.toFixed(1)+"%":"─"],
    ]);
    XLSX.writeFile(wb,`충청_${yr}년_${mode}_${part}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  if(!dbReady) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      height:"100vh",gap:14,background:"#07101f"}}>
      <div style={{width:36,height:36,borderRadius:"50%",border:"4px solid rgba(56,182,245,.2)",
        borderTopColor:"#38b6f5",animation:"spin 0.9s linear infinite"}}/>
      <span style={{color:"#6a9ab8",fontSize:14,fontWeight:600}}>데이터 불러오는 중...</span>
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>

      {/* ── 헤더 */}
      <div style={{position:"sticky",top:0,zIndex:100,background:C.surf,borderBottom:`1px solid ${C.b1}`,padding:"0 16px"}}>
        <div style={{maxWidth:1360,margin:"0 auto",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",padding:"8px 0"}}>
          <a href="index.html" style={{display:"flex",alignItems:"center",gap:8,textDecoration:"none",color:C.text,marginRight:8,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#fff"}}>C</div>
            <div>
              <div style={{fontWeight:800,fontSize:12,color:C.text}}>충청영업팀</div>
              <div style={{fontSize:9,color:C.muted}}>← 메인으로</div>
            </div>
          </a>
          <div style={{width:1,height:24,background:C.b1}}/>
          <span style={{color:C.accent,fontWeight:800,fontSize:13,flexShrink:0}}>📋 달성 계획</span>

          <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
            {MODES.map(m=>(
              <button key={m} onClick={()=>setMode(m)} style={{
                padding:"5px 12px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11,
                fontFamily:"inherit",border:`1px solid ${mode===m?(m==="판매"?C.판매:C.매출):C.b2}`,
                background:mode===m?(m==="판매"?C.판매:C.매출)+"22":"transparent",
                color:mode===m?(m==="판매"?C.판매:C.매출):C.muted}}>
                <span style={{color:m==="판매"?C.판매:C.매출}}>●</span> {m}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:3}}>
            {YRS.map(y=>(
              <button key={y} onClick={()=>setYr(y)} style={{
                padding:"4px 9px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:11,
                fontFamily:"inherit",border:`1px solid ${yr===y?C.blue:C.b2}`,
                background:yr===y?C.blue+"22":"transparent",color:yr===y?C.blue:C.muted}}>
                {y}년
              </button>
            ))}
          </div>
          {/* 글자 크기 */}
          <div style={{display:"flex",alignItems:"center",gap:3,background:"rgba(255,255,255,.05)",borderRadius:6,padding:"3px 6px"}}>
            <button onClick={()=>setFontSize(f=>Math.max(11,f-1))} style={{
              padding:"2px 6px",border:"none",background:"transparent",color:C.muted,
              cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}}>A−</button>
            <span style={{color:C.muted2,fontSize:10,minWidth:22,textAlign:"center"}}>{fontSize}</span>
            <button onClick={()=>setFontSize(f=>Math.min(20,f+1))} style={{
              padding:"2px 6px",border:"none",background:"transparent",color:C.muted,
              cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}}>A+</button>
          </div>
          <button onClick={handleSave} disabled={!isEditing||!hasDraft||saveState==="saving"} style={{
            padding:"6px 14px",borderRadius:6,
            cursor:isEditing&&hasDraft?"pointer":"default",fontWeight:700,
            fontSize:11,fontFamily:"inherit",border:"none",flexShrink:0,
            background:saveState==="saved"?C.green:saveState==="error"?C.red:isEditing&&hasDraft?C.accent:"rgba(255,255,255,.06)",
            color:isEditing&&hasDraft?"#fff":C.muted,opacity:saveState==="saving"?.7:1}}>
            {saveState==="saving"?"저장 중...":saveState==="saved"?"✅ 저장됨":saveState==="error"?"❌ 오류":"💾 저장"}
          </button>
          <button onClick={handleExcel} style={{
            padding:"6px 14px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11,
            fontFamily:"inherit",border:`1px solid ${C.green}`,background:C.green+"18",color:C.green,flexShrink:0}}>
            📥 엑셀
          </button>
        </div>
        {/* 파트 선택 */}
        <div style={{maxWidth:1360,margin:"0 auto",display:"flex",gap:4,paddingBottom:8,overflowX:"auto"}}>
          {PARTS.map(k=>(
            <button key={k} onClick={()=>setPart(k)} style={{
              padding:"4px 10px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:11,
              fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0,transition:"all .15s",
              border:`1px solid ${part===k?KC[k]||C.accent:C.b1}`,
              background:part===k?(KC[k]||C.accent)+"22":"transparent",
              color:part===k?KC[k]||C.accent:C.muted,
              boxShadow:part===k?`0 0 6px ${KC[k]||C.accent}30`:"none"}}>
              {k}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1360,margin:"0 auto",padding:"16px",display:"flex",flexDirection:"column",gap:14}}>

        {/* ── [1] KPI 카드 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>

          {/* 연간 목표 */}
          <div style={{background:C.card,border:`1px solid ${C.orange}28`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>연간 목표</div>
            <div style={{color:C.orange,fontSize:15,fontWeight:900}}>{fmtN(annT)}</div>
          </div>

          {/* 누계 실적 + 월평균 */}
          <div style={{background:C.card,border:`1px solid ${color}28`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>누계 실적{emi>=0?` (${MONTHS[emi]})`:""}</div>
            <div style={{color,fontSize:16,fontWeight:900}}>{fmtN(ytdP)}</div>
            {avgMonthly>0&&<div style={{color:C.muted2,fontSize:9,marginTop:3}}>월평균 {avgMonthly.toLocaleString()}억</div>}
          </div>

          {/* 누계 달성률 */}
          <div style={{background:C.card,border:`1px solid ${ytdAr?pctC(ytdAr):C.muted}28`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>누계 달성률</div>
            <div style={{color:ytdAr?pctC(ytdAr):C.muted,fontSize:15,fontWeight:900}}>{ytdAr?Math.round(gNum(ytdAr))+"%":"─"}</div>
          </div>

          {/* 전년비 성장 */}
          <div style={{background:C.card,border:`1px solid ${ytdGr?grwC(ytdGr):C.muted}28`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>전년비 성장</div>
            <div style={{color:ytdGr?grwC(ytdGr):C.muted,fontSize:15,fontWeight:900}}>
              {ytdGr?(gNum(ytdGr)>0?"▲":"▼")+Math.abs(gNum(ytdGr)).toFixed(1)+"%":"─"}
            </div>
          </div>

          {/* 누계 전년 + 월평균 */}
          <div style={{background:C.card,border:`1px solid ${C.muted2}28`,borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:C.muted,fontSize:9,fontWeight:700,marginBottom:3}}>누계 전년</div>
            <div style={{color:C.muted2,fontSize:15,fontWeight:900}}>{fmtN(ytdPrev)}</div>
            {prevAvgMonthly>0&&<div style={{color:C.muted,fontSize:9,marginTop:3}}>월평균 {prevAvgMonthly.toLocaleString()}억</div>}
          </div>

          {/* 잔여 목표 + 잔여 월평균 */}
          <div style={{background:C.card,border:`1px solid ${remT>0?C.blue:C.muted}28`,borderRadius:10,padding:"10px 12px"}}>

            <div style={{color:remT>0?C.blue:C.muted,fontSize:15,fontWeight:900}}>{fmtN(remT)}</div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontWeight:800,fontSize:14,color:C.text}}>📌 전년도 주요 사항</span>
              <span style={{color:C.muted,fontSize:11}}>{mode} · {part}</span>
            </div>
            <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{color:C.muted,fontSize:10}}>연도:</span>
              {["25","24","23"].map(y=><TabBtn key={y} label={y+"년"} active={prevNoteYr===y} color={C.muted2} onClick={()=>setPrevNoteYr(y)}/>)}
            </div>
          </div>

          {/* 전년도 월 선택 */}
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
            <button onClick={()=>setPrevNoteMonth("annual")} style={{
              padding:"4px 10px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:10,
              fontFamily:"inherit",border:`1px solid ${prevNoteMonth==="annual"?C.muted2:C.b1}`,
              background:prevNoteMonth==="annual"?C.muted2+"22":"transparent",
              color:prevNoteMonth==="annual"?C.muted2:C.muted}}>
              연간
            </button>
            {MONTHS.map((m,i)=>{
              const hasTxt=getText("prev_"+prevNoteYr,mode,part,String(i)).length>0;
              return(
                <button key={i} onClick={()=>setPrevNoteMonth(i)} style={{
                  padding:"4px 8px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:10,
                  fontFamily:"inherit",border:`1px solid ${prevNoteMonth===i?C.muted2:hasTxt?C.muted2+"50":C.b1}`,
                  background:prevNoteMonth===i?C.muted2+"22":hasTxt?C.muted2+"0a":"transparent",
                  color:prevNoteMonth===i?C.muted2:hasTxt?C.muted2:C.muted,position:"relative"}}>
                  {m}
                  {hasTxt&&prevNoteMonth!==i&&<span style={{position:"absolute",top:1,right:1,width:3,height:3,borderRadius:"50%",background:C.muted2,display:"block"}}/>}
                </button>
              );
            })}
          </div>

          <div style={{marginBottom:6}}>
            <div style={{color:C.muted2,fontSize:11,fontWeight:700,marginBottom:8}}>
              {prevNoteMonth==="annual"?"연간":"${MONTHS[prevNoteMonth]}"} 주요 사항
              <span style={{color:C.muted,fontWeight:400,marginLeft:6,fontSize:10}}>({prevNoteYr}년 실적 특이사항, 참고 내용)</span>
            </div>
            <RichEditor
              value={getText("prev_"+prevNoteYr,mode,part,prevNoteMonth==="annual"?"annual":String(prevNoteMonth))}
              onChange={e=>setText("prev_"+prevNoteYr,mode,part,prevNoteMonth==="annual"?"annual":String(prevNoteMonth),e.target.value)}
              placeholder={"예)\n• 1분기: 혼수·이사 수요 호조로 목표 초과달성\n• 하반기: 경기침체로 고가 제품 판매 부진\n• 연간 달성률 103%, 전년비 +5%"}
              minHeight={140}
              readOnly={!isEditing}
              fontSize={fontSize-1}
            />
          </div>

          {/* 하단 버튼 */}
          <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:12}}>
            {isEditing?(
              <>
                <button onClick={()=>{setTextDraft({});setIsEditing(false);}} style={{
                  padding:"6px 14px",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:11,
                  fontFamily:"inherit",border:`1px solid ${C.muted}`,background:"transparent",color:C.muted}}>
                  취소
                </button>
                <button onClick={handleSave} disabled={!hasDraft||saveState==="saving"} style={{
                  padding:"6px 18px",borderRadius:7,fontWeight:700,fontSize:11,fontFamily:"inherit",
                  border:"none",cursor:hasDraft?"pointer":"default",
                  background:hasDraft?C.accent:"rgba(255,255,255,.08)",
                  color:hasDraft?"#fff":C.muted,opacity:saveState==="saving"?.6:1}}>
                  {saveState==="saving"?"저장 중...":"💾 저장"}
                </button>
              </>
            ):(
              <button onClick={()=>setIsEditing(true)} style={{
                padding:"6px 18px",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:11,
                fontFamily:"inherit",border:`1px solid ${C.muted2}`,background:C.muted2+"18",color:C.muted2}}>
                ✏️ 수정
              </button>
            )}
          </div>
        </div>

        <div style={{color:C.muted,fontSize:10,textAlign:"center",paddingBottom:16}}>
          충청영업팀 실적관리 시스템 · 달성 계획 / 비밀번호 문의: 관리자
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><PlanApp/></ErrorBoundary>);
</script>
</body>
</html>
