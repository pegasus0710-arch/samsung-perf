<script>
  const PW_HASH    = "7964106471ddb947a30a14c1f9a74a3fed4a7d6029f0047291138292c23a4c99";
  const SESSION_KEY = "cst_auth_v1";
  async function sha256(str){
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function checkPw(){
    const input=document.getElementById("pw-input").value;
    const errEl=document.getElementById("pw-error");
    const boxEl=document.getElementById("pw-box");
    if(!input){errEl.textContent="비밀번호를 입력해주세요.";return;}
    const hash=await sha256(input);
    if(hash===PW_HASH){
      sessionStorage.setItem(SESSION_KEY,"1");
      document.getElementById("pw-gate").style.display="none";
    } else {
      errEl.textContent="비밀번호가 올바르지 않습니다.";
      boxEl.classList.remove("shake");
      void boxEl.offsetWidth;
      boxEl.classList.add("shake");
      document.getElementById("pw-input").value="";
    }
  }
  (function(){
    if(sessionStorage.getItem(SESSION_KEY)==="1"){
      document.getElementById("pw-gate").style.display="none";
    }
  })();
</script>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── 상수 ──
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const PARTS=["대외영업","혼수","뉴홈","입주","이사","SAC","거주중","B2B","SMB","농협","휴대폰"];
const MODES=["판매","매출"];
const YRS=["26","25","24"];
const LS_PLAN="cst_plan_draft_v1";

const KC={
  "대외영업":"#38b6f5","혼수":"#f5b942","뉴홈":"#2dd488","입주":"#34d399",
  "이사":"#60a5fa","SAC":"#c084fc","거주중":"#f472b6","B2B":"#fb923c",
  "SMB":"#facc15","농협":"#a3e635","휴대폰":"#94a3b8","CE":"#7c83f5"
};

const C={
  bg:"#07101f",surf:"#0d1b2e",card:"#0f2138",card2:"#0a1628",
  b1:"rgba(255,255,255,.08)",b2:"rgba(255,255,255,.14)",
  text:"#e8f4fd",muted:"#4a7090",muted2:"#6a9ab8",
  accent:"#7c83f5",blue:"#3b82f6",green:"#2dd488",
  orange:"#f5b942",teal:"#2dd4bf",red:"#f07070",
  판매:"#f5b942",매출:"#38b6f5",
};

const gNum=v=>parseFloat(v)||0;
const sk=i=>`${i}`;
const fmt=v=>{ const n=gNum(v); return n>0?Math.round(n).toLocaleString():"─"; };
const fmtPct=(a,b)=>b>0?((a/b)*100).toFixed(1)+"%" :"─";
const fmtGrw=(cur,prev)=>prev>0?((cur-prev)/prev*100).toFixed(1)+"%":"─";
const pctC=v=>{const n=gNum(v);return n>=100?C.green:n>=80?C.orange:C.red;};
const grwC=v=>{const n=gNum(v);return n>0?C.green:n<0?C.red:C.muted2;};

function fullRow(r){
  const base={CE:0,혼수:0,입주:0,이사:0,SAC:0,거주중:0,SMB:0,농협:0,휴대폰:0};
  if(!r)return{...base,대외영업:0,뉴홈:0,B2B:0};
  const o={...base,...r};
  const hp=gNum(o.휴대폰);
  o.대외영업=gNum(o.혼수)+gNum(o.입주)+gNum(o.이사)+gNum(o.SAC)+gNum(o.거주중)+gNum(o.SMB)+gNum(o.농협)+hp;
  o.뉴홈=gNum(o.입주)+gNum(o.이사);
  o.B2B=gNum(o.SMB)+gNum(o.농협)+hp;
  return o;
}

// ── SVG 미니 라인 차트 ──
function MiniChart({series,labels,h=130,pctMode=false,grMode=false}){
  const [tip,setTip]=useState(null);
  const W=560,PT=18,PL=32,PR=20,PB=28;
  const iH=h-PT-PB, iW=W-PL-PR;
  const allV=series.flatMap(s=>s.data.filter(v=>v!==null)).map(gNum);
  const hasData=allV.length>0;
  if(!hasData)return <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>데이터 없음</div>;

  const minV=grMode?0:0;
  const maxV=Math.max(...allV,pctMode?100:0.1);
  const cy=v=>PT+iH*(1-(gNum(v)-minV)/(maxV-minV||1));
  const cx=i=>PL+iW*i/11;

  const smooth=pts=>{
    if(pts.length<2)return `M${pts[0].x},${pts[0].y}`;
    let d=`M${pts[0].x},${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const px=pts[i-1],nx=pts[i];
      const cpx=(px.x+nx.x)/2;
      d+=` C${cpx},${px.y} ${cpx},${nx.y} ${nx.x},${nx.y}`;
    }
    return d;
  };

  return(
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,overflow:"visible"}}
        onMouseLeave={()=>setTip(null)}>
        {/* 가로선 */}
        {[0,.25,.5,.75,1].map(r=>{
          const y=PT+iH*(1-r);
          return <line key={r} x1={PL} y1={y} x2={W-PR} y2={y}
            stroke="rgba(255,255,255,.05)" strokeWidth={1}/>;
        })}
        {/* 100% 기준선 (달성률) */}
        {pctMode&&<line x1={PL} y1={cy(100)} x2={W-PR} y2={cy(100)}
          stroke={C.green} strokeWidth={1} strokeDasharray="4,3" opacity={.5}/>}
        {/* 0% 기준선 (성장률) */}
        {grMode&&<line x1={PL} y1={cy(0)} x2={W-PR} y2={cy(0)}
          stroke="rgba(255,255,255,.2)" strokeWidth={1}/>}

        {series.map((s,si)=>{
          const pts=s.data.map((v,i)=>({x:cx(i),y:cy(v),v:gNum(v),valid:v!==null}))
            .filter(p=>p.valid);
          if(!pts.length)return null;
          const d=smooth(pts);
          const fillPath=`${d} L${pts[pts.length-1].x},${PT+iH} L${pts[0].x},${PT+iH} Z`;
          return(
            <g key={si}>
              {s.fill&&<path d={fillPath} fill={s.color} opacity={.08}/>}
              <path d={d} fill="none" stroke={s.color} strokeWidth={s.bold?2.5:1.5}
                strokeDasharray={s.dash?"5,3":undefined} opacity={s.op||1}/>
              {pts.map((p,pi)=>(
                <circle key={pi} cx={p.x} cy={p.y} r={s.bold?3.5:2.5}
                  fill={s.color} stroke={C.bg} strokeWidth={1.5} opacity={s.op||1}/>
              ))}
              {s.showLabels&&pts.map((p,pi)=>{
                const prev=pts[pi-1];
                const goUp=!prev||p.y<prev.y;
                const lY=p.y+(goUp?-10:13);
                const anchor=p.x<PL+30?"start":p.x>W-PR-30?"end":"middle";
                return(
                  <text key={pi} x={p.x} y={lY} fill={s.color} fontSize={9} fontWeight={700}
                    textAnchor={anchor} style={{filter:"drop-shadow(0 1px 2px rgba(0,0,0,.8))"}}>
                    {pctMode||grMode?Math.round(p.v)+"%":Math.round(p.v)}
                  </text>
                );
              })}
            </g>
          );
        })}

        {/* 마우스 오버 세로선 */}
        {labels.map((_,i)=>(
          <rect key={i} x={cx(i)-18} y={PT} width={36} height={iH}
            fill="transparent" onMouseEnter={e=>{
              const items=series.map(s=>({
                label:s.label,color:s.color,
                val:s.data[i]!==null?gNum(s.data[i]):null
              })).filter(it=>it.val!==null);
              setTip({mi:i,items,x:cx(i)/W*100,y:PT/h*100});
            }}/>
        ))}
        {/* X축 레이블 */}
        {labels.map((l,i)=>(
          <text key={i} x={cx(i)} y={h-8} fill={C.muted} fontSize={9} textAnchor="middle">{l}</text>
        ))}
      </svg>
      {tip&&(
        <div style={{position:"absolute",left:`${Math.min(tip.x+2,68)}%`,top:`${Math.max(tip.y,5)}%`,
          background:"rgba(7,16,31,.96)",border:`1px solid ${C.b2}`,
          borderRadius:8,padding:"8px 12px",pointerEvents:"none",zIndex:10,
          boxShadow:"0 4px 16px rgba(0,0,0,.5)",minWidth:100}}>
          <div style={{color:C.muted,fontSize:9,marginBottom:4,fontWeight:700}}>{labels[tip.mi]}</div>
          {tip.items.map((it,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:2}}>
              <span style={{color:C.muted2,fontSize:10}}>{it.label}</span>
              <span style={{color:it.color,fontSize:11,fontWeight:800}}>
                {pctMode||grMode?Math.round(it.val)+"%":Math.round(it.val)+"억"}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 메인 앱 ──
function PlanApp(){
  const [perfData,setPerfData]=useState(null);
  const [planData,setPlanData]=useState({});
  const [draft,setDraft]=useState({});       // 미저장 입력값
  const [part,setPart]=useState("대외영업");
  const [mode,setMode]=useState("판매");
  const [yr,setYr]=useState("26");
  const [chartTab,setChartTab]=useState("실적");
  const [cumChartTab,setCumChartTab]=useState("실적");
  const [saveState,setSaveState]=useState("idle"); // idle|saving|saved|error
  const [dbReady,setDbReady]=useState(false);
  const [planInput,setPlanInput]=useState("26"); // 계획 입력 연도 탭
  const autoSaveTimer=useRef(null);

  // Firebase 로드
  useEffect(()=>{
    (async()=>{
      try{
        const snap=await window.db.collection("perf").doc("main").get();
        if(snap.exists){
          const d=snap.data();
          if(d.perfData) setPerfData(d.perfData);
          if(d.planData)  setPlanData(d.planData);
        }
      }catch(e){ console.error(e); }
      finally{ setDbReady(true); window.__appReady=true; }
    })();
  },[]);

  // localStorage 임시저장 복원
  useEffect(()=>{
    try{
      const saved=localStorage.getItem(LS_PLAN);
      if(saved){ const p=JSON.parse(saved); setDraft(p); }
    }catch{}
  },[]);

  // draft 변경 시 3초 후 localStorage 자동저장
  useEffect(()=>{
    clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{
      try{ localStorage.setItem(LS_PLAN,JSON.stringify(draft)); }catch{}
    },3000);
    return()=>clearTimeout(autoSaveTimer.current);
  },[draft]);

  // 실적 데이터 파싱
  const pD=useMemo(()=>{
    if(!perfData) return {};
    return perfData[yr]?.[mode]?.perf||{};
  },[perfData,yr,mode]);
  const tD=useMemo(()=>{
    if(!perfData) return {};
    return perfData[yr]?.[mode]?.target||{};
  },[perfData,yr,mode]);
  const pD25=useMemo(()=>perfData?.[yr==="26"?"25":yr==="25"?"24":null]?.[mode]?.perf||{}:{},[perfData,yr,mode]);

  // 월별 실적/목표/전년
  const mPerf=MONTHS.map((_,i)=>fullRow(pD[sk(i)])?.[part]||0);
  const mTgt=MONTHS.map((_,i)=>fullRow(tD[sk(i)])?.[part]||0);
  const mPrev=MONTHS.map((_,i)=>fullRow(pD25[sk(i)])?.[part]||0);

  // 마지막 입력 월 (emi)
  const emi=useMemo(()=>{
    for(let i=11;i>=0;i--){
      const r=pD[sk(i)];
      if(r&&Object.values(r).some(v=>gNum(v)>0)) return i;
    }
    return -1;
  },[pD]);

  // 달성 계획 데이터 (draft 우선, planData 폴백)
  const getPlan=(pYr,pMode,pPart,mi)=>{
    return gNum(draft?.[pYr]?.[pMode]?.[pPart]?.[mi]) ||
           gNum(planData?.[pYr]?.[pMode]?.[pPart]?.[mi]);
  };
  const getAnnualPlan=(pYr,pMode,pPart)=>{
    return gNum(draft?.[pYr]?.[pMode]?.[pPart]?.annual) ||
           gNum(planData?.[pYr]?.[pMode]?.[pPart]?.annual);
  };
  const setPlan=(pYr,pMode,pPart,mi,val)=>{
    setDraft(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      if(!next[pYr]) next[pYr]={};
      if(!next[pYr][pMode]) next[pYr][pMode]={};
      if(!next[pYr][pMode][pPart]) next[pYr][pMode][pPart]={};
      if(mi==="annual") next[pYr][pMode][pPart].annual=val;
      else next[pYr][pMode][pPart][mi]=val;
      return next;
    });
  };

  // Firebase 저장
  const handleSave=async()=>{
    setSaveState("saving");
    try{
      // draft를 planData에 딥머지
      const merged=JSON.parse(JSON.stringify(planData));
      const mergeDeep=(t,s)=>{
        Object.keys(s).forEach(k=>{
          if(s[k]&&typeof s[k]==="object"&&!Array.isArray(s[k])){
            if(!t[k]) t[k]={};
            mergeDeep(t[k],s[k]);
          } else { t[k]=s[k]; }
        });
        return t;
      };
      mergeDeep(merged,draft);
      await window.db.collection("perf").doc("main").update({
        planData:merged,
        planUpdatedAt:new Date().toISOString()
      });
      setPlanData(merged);
      setDraft({});
      localStorage.removeItem(LS_PLAN);
      setSaveState("saved");
      setTimeout(()=>setSaveState("idle"),2500);
    }catch(e){
      console.error(e);
      setSaveState("error");
      setTimeout(()=>setSaveState("idle"),3000);
    }
  };

  // ── KPI 계산 ──
  const ytdP=mPerf.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdT=mTgt.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const ytdPrev=mPrev.slice(0,Math.max(emi+1,0)).reduce((a,b)=>a+b,0);
  const annT=mTgt.reduce((a,b)=>a+b,0);
  const remT=Math.max(annT-ytdP,0);
  const remMonths=Math.max(11-emi,0);
  const avgMonthly=emi>=0&&ytdP>0?Math.round(ytdP/(emi+1)):0;
  const needPM=remMonths>0?Math.ceil(remT/remMonths):0;
  const ytdAr=ytdT>0?(ytdP/ytdT*100).toFixed(1):null;
  const ytdGr=ytdPrev>0?((ytdP-ytdPrev)/ytdPrev*100).toFixed(1):null;

  // CE 비중
  const ceYtd=MONTHS.slice(0,Math.max(emi+1,0)).reduce((a,_,i)=>a+(fullRow(pD[sk(i)])?.CE||0),0);
  const hp=MONTHS.slice(0,Math.max(emi+1,0)).reduce((a,_,i)=>a+(fullRow(pD[sk(i)])?.휴대폰||0),0);
  const daeYtd=MONTHS.slice(0,Math.max(emi+1,0)).reduce((a,_,i)=>a+(fullRow(pD[sk(i)])?.대외영업||0),0);
  const ceSharePct=ceYtd>0&&part!=="CE"?(
    part==="대외영업"?(daeYtd-hp)/ceYtd*100
    :part==="B2B"?((fullRow(pD[sk(emi)])?.B2B||0)-hp)/ceYtd*100
    :ytdP/ceYtd*100
  ):null;
  const daeSharePct=daeYtd>0&&part!=="대외영업"&&part!=="CE"?ytdP/daeYtd*100:null;

  // 누계
  let cumP=0,cumT=0,cumPrev=0;
  const cumPerf=MONTHS.map((_,i)=>{
    if(i>emi)return null;
    cumP+=mPerf[i]; return cumP;
  });
  const cumTgt=MONTHS.map((_,i)=>{
    cumT+=mTgt[i]; return cumT;
  });
  const cumPrevArr=MONTHS.map((_,i)=>{
    if(i>emi)return null;
    cumPrev+=mPrev[i]; return cumPrev;
  });
  const cumAr=MONTHS.map((_,i)=>{
    if(i>emi||!cumTgt[i])return null;
    const cp=cumPerf[i]||0;
    return cp/cumTgt[i]*100;
  });
  const cumGr=MONTHS.map((_,i)=>{
    if(i>emi||!cumPrevArr[i])return null;
    return (cumPerf[i]-cumPrevArr[i])/cumPrevArr[i]*100;
  });

  // 달성 계획 월별 (현재 입력 연도/모드/파트)
  const planMonthly=MONTHS.map((_,i)=>getPlan(planInput,mode,part,i));
  const planAnnual=getAnnualPlan(planInput,mode,part);

      ["성장률",...MONTHS.map((_,i)=>i<=emi&&mPrev[i]>0?((mPerf[i]-mPrev[i])/mPrev[i]*100).toFixed(1)+"%":"")],
      ["전년",...MONTHS.map((_,i)=>i<=emi?mPrev[i]:""),ytdPrev],

    // Sheet2: 누계

    const rows2=[
      ["누계목표",...cumTgt.map(v=>v>0?Math.round(v):"")],

      ["누계달성",...cumAr.map(v=>v!==null?v.toFixed(1)+"%":"")],
      ["누계성장",...cumGr.map(v=>v!==null?v.toFixed(1)+"%":"")],
      ["누계전년",...cumPrevArr.map(v=>v!==null?Math.round(v):"")],

      ["Gap",...planGap.map(v=>v!==null?v.toFixed(0):"")],

      ["월평균",avgMonthly?avgMonthly+"억":"─"],
      ["잔여목표(월평균)",needPM?needPM+"억":"─"],

      ["대외영업비중",daeSharePct?daeSharePct.toFixed(1)+"%":"─"],
    ];
    addSheet("KPI요약",[h1,[],[`${yr}년 ${MONTHS[emi]} 기준`,mode,part],[],,...kpiRows]);

    XLSX.writeFile(wb,`충청영업팀_${yr}년_${mode}_${part}_${new Date().toISOString().slice(0,10)}.xlsx`);

  const hasDraft=Object.keys(draft).length>0;

              <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
                {hasDraft&&<Chip c={C.orange}>● 미저장 입력 있음</Chip>}
                <Chip c={C.muted}>자동저장: localStorage</Chip>
              </div>
            </div>
            {/* 계획 입력 연도 탭 */}
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <span style={{color:C.muted,fontSize:10}}>입력 연도:</span>
              {YRS.map(y=>(
                <button key={y} onClick={()=>setPlanInput(y)} style={{
                  padding:"4px 9px",borderRadius:5,cursor:"pointer",fontWeight:700,fontSize:11,
                  fontFamily:"inherit",border:`1px solid ${planInput===y?C.accent:C.b1}`,
                  background:planInput===y?C.accent+"22":"transparent",
                  color:planInput===y?C.accent:C.muted}}>
                  {y}년
                </button>
              ))}
            </div>
          </div>

          {/* 연간 계획 + 시뮬레이터 */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <div style={{background:C.card,border:`1px solid ${C.accent}40`,borderRadius:8,
              padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flex:1,minWidth:200}}>
              <div>
                <div style={{color:C.muted,fontSize:9,fontWeight:700}}>연간 계획 (직접 입력)</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                  <input type="number" value={planAnnual||""}
                    onChange={e=>setPlan(planInput,mode,part,"annual",e.target.value)}
                    placeholder="0" style={{
                      width:80,background:C.bg,border:`1px solid ${C.accent}60`,
                      borderRadius:5,padding:"4px 8px",color:C.text,fontSize:13,fontWeight:700,
                      outline:"none",fontFamily:"inherit"}}/>
                  <span style={{color:C.muted,fontSize:11}}>억</span>
                  {planVsTarget&&<span style={{color:pctC(planVsTarget),fontSize:11,fontWeight:700}}>
                    (목표대비 {planVsTarget}%)
                  </span>}
                </div>
              </div>
            </div>
            <div style={{background:C.card,border:`1px solid ${C.teal}40`,borderRadius:8,
              padding:"10px 14px",flex:1,minWidth:200}}>
              <div style={{color:C.muted,fontSize:9,fontWeight:700}}>연말 예상 달성 시뮬레이터</div>
              <div style={{marginTop:4,display:"flex",gap:12,flexWrap:"wrap"}}>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>실적+잔여계획</div>
                  <div style={{color:C.teal,fontSize:14,fontWeight:900}}>
                    {expectedEnd?Math.round(expectedEnd).toLocaleString()+"억":"─"}
                  </div>
                </div>
                <div>
                  <div style={{color:C.muted2,fontSize:9}}>예상 달성률</div>
                  <div style={{color:expectedAr?pctC(expectedAr):C.muted,fontSize:14,fontWeight:900}}>
                    {expectedAr?Math.round(gNum(expectedAr))+"%":"─"}
                  </div>
                </div>
                {planSum>0&&annT>0&&(
                  <div>
                    <div style={{color:C.muted2,fontSize:9}}>월계획 합계</div>
                    <div style={{color:C.orange,fontSize:14,fontWeight:900}}>
                      {Math.round(planSum).toLocaleString()}억
                      <span style={{color:C.muted,fontSize:9,fontWeight:400}}> / {Math.round(annT)}억</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* 월별 계획 입력 테이블 */}
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",minWidth:780,width:"100%"}}>
              <thead>
                <tr style={{borderBottom:`2px solid ${C.b1}`}}>
                  <td style={{padding:"5px 10px",color:C.muted,fontSize:10,fontWeight:700,
                    minWidth:72,position:"sticky",left:0,background:C.card2}}>항목</td>
                  {MONTHS.map((m,i)=>(
                    <td key={m} style={{padding:"5px 5px",textAlign:"center",
                      color:C.muted2,fontSize:10,fontWeight:600,minWidth:52}}>
                      {m}
                    </td>
                  ))}
                  <td style={{padding:"5px 8px",textAlign:"right",color:C.muted2,
                    fontSize:10,fontWeight:700,minWidth:52}}>합계</td>
                </tr>
              </thead>
              <tbody>
                {/* 연간목표 참고행 */}
                <tr style={{borderBottom:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color:C.orange,fontSize:10,fontWeight:600,
                    position:"sticky",left:0,background:C.card2}}>연간목표</td>
                  {mTgt.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      <span style={{color:C.orange,fontSize:10,opacity:.75}}>
                        {v>0?Math.round(v).toLocaleString():"─"}
                      </span>
                    </td>
                  ))}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color:C.orange,fontWeight:700,fontSize:11}}>
                      {annT?Math.round(annT).toLocaleString()+"억":"─"}
                    </span>
                  </td>
                </tr>
                {/* 계획 입력행 */}
                <tr style={{background:C.accent+"08",borderBottom:`1px solid ${C.accent}30`}}>
                  <td style={{padding:"4px 10px",color:C.accent,fontSize:10,fontWeight:700,
                    position:"sticky",left:0,background:C.card}}>계획 입력</td>
                  {MONTHS.map((_,i)=>{
                    const v=planMonthly[i];
                    const tgt=mTgt[i];
                    const hasMismatch=tgt>0&&v>0&&Math.abs(v-tgt)/tgt>0.2;
                    return(
                      <td key={i} style={{padding:"3px 3px",textAlign:"center"}}>
                        <input type="number" value={v||""}
                          onChange={e=>setPlan(planInput,mode,part,i,e.target.value)}
                          placeholder={tgt?Math.round(tgt):"0"}
                          style={{width:48,background:C.bg,
                            border:`1px solid ${hasMismatch?C.orange:C.b1}`,
                            borderRadius:4,padding:"3px 4px",color:C.text,fontSize:11,
                            textAlign:"center",outline:"none",fontFamily:"inherit"}}/>
                      </td>
                    );
                  })}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color:C.accent,fontWeight:700,fontSize:11}}>
                      {planSum?Math.round(planSum).toLocaleString()+"억":"─"}
                    </span>
                  </td>
                </tr>
                {/* 실적 참고행 (emi까지) */}
                <tr style={{borderBottom:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color:color,fontSize:10,fontWeight:600,
                    position:"sticky",left:0,background:C.card2}}>실적</td>
                  {mPerf.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      <span style={{color:i<=emi?color:C.muted,fontSize:10}}>
                        {i<=emi&&v>0?Math.round(v).toLocaleString():"─"}
                      </span>
                    </td>
                  ))}
                  <td style={{padding:"4px 8px",textAlign:"right"}}>
                    <span style={{color,fontWeight:700,fontSize:11}}>
                      {ytdP?Math.round(ytdP).toLocaleString()+"억":"─"}
                    </span>
                  </td>
                </tr>
                {/* Gap (계획 대비 실적) */}
                <tr>
                  <td style={{padding:"4px 10px",color:C.muted,fontSize:10,fontWeight:600,
                    position:"sticky",left:0,background:C.card2}}>Gap</td>
                  {planGap.map((v,i)=>(
                    <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                      {v!==null?(
                        <span style={{color:v>=0?C.green:C.red,fontSize:10,fontWeight:700}}>
                          {v>=0?"+":""}{Math.round(v)}
                        </span>
                      ):<span style={{color:C.muted,fontSize:9}}>─</span>}
                    </td>
                  ))}
                  <td/>
                </tr>
                {/* 전월 대비 계획 증감 */}
                <tr style={{borderTop:`1px solid ${C.b1}18`}}>
                  <td style={{padding:"4px 10px",color:C.muted,fontSize:10,fontWeight:600,
                    position:"sticky",left:0,background:C.card2}}>전월比</td>
                  {planMonthly.map((v,i)=>{
                    const prev=planMonthly[i-1];
                    const diff=prev>0&&v>0?((v-prev)/prev*100):null;
                    return(
                      <td key={i} style={{padding:"4px 5px",textAlign:"center"}}>
                        {diff!==null?(
                          <span style={{color:diff>=0?C.green:C.red,fontSize:9}}>
                            {diff>=0?"+":""}{diff.toFixed(0)}%
                          </span>
                        ):<span style={{color:C.muted,fontSize:9}}>─</span>}
                      </td>
                    );
                  })}
                  <td/>
                </tr>
              </tbody>
            </table>
          </div>

          {/* 계획 경고 */}
          {planSum>0&&annT>0&&Math.abs(planSum-annT)/annT>0.05&&(
            <div style={{marginTop:10,padding:"8px 12px",borderRadius:7,
              background:planSum<annT?C.red+"18":C.green+"18",
              border:`1px solid ${planSum<annT?C.red:C.green}40`}}>
              <span style={{color:planSum<annT?C.red:C.green,fontSize:11,fontWeight:700}}>
                {planSum<annT
                  ?`⚠ 월계획 합계(${Math.round(planSum)}억)가 연간목표(${Math.round(annT)}억)보다 ${Math.round(annT-planSum)}억 부족합니다.`
                  :`✅ 월계획 합계(${Math.round(planSum)}억)가 연간목표(${Math.round(annT)}억)를 ${Math.round(planSum-annT)}억 초과합니다.`}
              </span>
            </div>
          )}
        </div>

      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<PlanApp/>);
</script>
</body>
</html>
